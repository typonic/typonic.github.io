<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=Satisfy&family=Josefin+Sans:wght@300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#fff8f2;--surface:#fff3ea;--accent:#f4a96a;--accent-dark:#e07930;
    --accent-light:#fde8d5;--text:#3d2a1a;--text-muted:#a07850;--border:rgba(200,130,70,0.2);
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
  .logo{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--accent-dark);}
  .points-badge{background:var(--accent);color:white;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;}

  .shop-btn{background:white;border:1.5px solid var(--accent);color:var(--accent-dark);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s;}
  .shop-btn:hover{background:var(--accent-light);}
  .shop-btn.midnight{background:#e07930;border-color:#e07930;color:white;}
  .shop-btn.midnight:hover{background:#c07d30;border-color:#c07d30;}

  .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;position:sticky;top:49px;z-index:15;}

  .fmt-dropdown{position:relative;}
  .fmt-trigger{background:white;border:1.5px solid var(--border);border-radius:9px;padding:5px 11px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;transition:all .13s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .fmt-trigger:hover{border-color:var(--accent);background:var(--accent-light);}
  .fmt-trigger.open{border-color:var(--accent-dark);background:var(--accent-light);}
  .fmt-trigger .arrow{font-size:9px;color:var(--text-muted);transition:transform .15s;}
  .fmt-trigger.open .arrow{transform:rotate(180deg);}

  .fmt-menu{position:absolute;top:calc(100% + 6px);left:0;background:white;border:1.5px solid var(--border);border-radius:14px;min-width:200px;padding:6px;box-shadow:0 8px 24px rgba(60,30,10,0.12);display:none;z-index:100;}
  .fmt-menu.open{display:block;}

  .fmt-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);padding:6px 10px 3px;}
  .fmt-sep{height:1px;background:var(--border);margin:5px 0;}
  .fmt-row{display:flex;gap:4px;padding:4px 6px;}
  .fmt-btn{background:none;border:1px solid transparent;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .12s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;width:100%;text-align:left;}
  .fmt-btn:hover{background:var(--accent-light);border-color:var(--border);}
  .fmt-btn.active{background:var(--accent);color:white;border-color:var(--accent-dark);}

  .swatch-row{display:flex;flex-wrap:wrap;gap:5px;padding:4px 10px 6px;}
  .swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0;}
  .swatch:hover{transform:scale(1.18);}
  .swatch.active{border-color:var(--accent-dark);}
  .hl-swatch{width:22px;height:22px;border-radius:5px;border:1.5px solid rgba(0,0,0,0.1);cursor:pointer;transition:transform .1s;flex-shrink:0;}
  .hl-swatch:hover{transform:scale(1.18);}
  .hl-swatch.active{outline:2px solid var(--accent-dark);outline-offset:1px;}
  .hl-none{background:white;position:relative;overflow:hidden;}
  .hl-none::after{content:'';position:absolute;top:50%;left:0;right:0;height:1.5px;background:#e07930;transform:rotate(-35deg);}
  .size-btns{display:flex;flex-direction:column;gap:3px;padding:4px 6px;}
  .size-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:4px 9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);transition:all .12s;text-align:left;}
  .size-btn:hover{background:var(--accent-light);border-color:var(--accent);}

  .editor-wrap{padding:20px 16px;max-width:740px;margin:0 auto;}
  .stats-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:10px;padding:5px 12px;font-size:12px;color:var(--text-muted);}
  .stat-pill strong{color:var(--text);}

  #editor{width:100%;min-height:400px;background:white;border:1.5px solid var(--border);border-radius:16px;padding:24px;font-family:'Lora',serif;font-size:17px;line-height:1.85;color:var(--text);outline:none;transition:border-color .15s;caret-color:var(--accent-dark);}
  #editor:focus{border-color:var(--accent);}
  #editor:empty:before{content:attr(data-placeholder);color:#d4b8a0;font-style:italic;pointer-events:none;}
  #editor blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--text-muted);margin:8px 0;font-style:italic;}

  .milestone-bar{height:5px;background:var(--accent-light);border-radius:3px;margin-top:10px;overflow:hidden;}
  .milestone-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .milestone-hint{font-size:12px;color:var(--text-muted);margin-top:5px;}

  .point-flash{position:fixed;pointer-events:none;font-size:14px;font-weight:600;color:var(--accent-dark);animation:floatUp .7s ease-out forwards;z-index:999;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-42px) scale(0.8);}}

  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(60,30,10,0.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--bg);border-radius:20px;width:90%;max-width:560px;max-height:82vh;overflow-y:auto;margin-bottom:30px;}
  .modal-header{background:var(--surface);padding:16px 18px;border-radius:20px 20px 0 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;}
  .modal-header h2{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--accent-dark);}
  .close-btn{background:none;border:none;font-size:19px;cursor:pointer;color:var(--text-muted);}
  .modal-pts-bar{padding:8px 18px;font-size:13px;color:var(--text-muted);border-bottom:1px solid var(--border);}
  .modal-pts-bar strong{color:var(--accent-dark);}
  .shop-section{padding:12px 18px 4px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);}
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 14px;}
  .shop-item{background:white;border:1.5px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .13s;position:relative;}
  .shop-item:hover:not(.owned):not(.cant-afford){border-color:var(--accent);background:var(--accent-light);}
  .shop-item.owned{border-color:#9cbb6a;background:#f4fbec;}
  .shop-item.cant-afford{opacity:.45;cursor:not-allowed;}
  .shop-item.active-item{border-color:var(--accent-dark);border-width:2px;}
  .item-preview{font-size:20px;margin-bottom:6px;height:28px;display:flex;align-items:center;}
  .item-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
  .item-desc{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
  .item-price{font-size:12px;font-weight:500;color:var(--accent-dark);}
  .item-price.owned-label{color:#5a8a30;}
  .owned-check{position:absolute;top:9px;right:9px;width:18px;height:18px;background:#9cbb6a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">✍️ Typonic</span>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="points-badge">🪙 <span id="topbar-pts">0</span> pts</div>
    <button class="shop-btn" id="shop-btn" onclick="openShop()">🛍 Shop</button>
  </div>
</div>

<div class="toolbar">
  <div class="fmt-dropdown" id="dd-style">
    <div class="fmt-trigger" id="tr-style" onclick="toggleDD('style')">✏️ Style <span class="arrow">▼</span></div>
    <div class="fmt-menu" id="menu-style">
      <div class="fmt-section-label">Format</div>
      <div class="fmt-row" style="flex-direction:column;gap:2px;">
        <button class="fmt-btn" id="btn-bold" onclick="fmt('bold')"><b style="font-weight:700;">B</b> &nbsp;Bold</button>
        <button class="fmt-btn" id="btn-italic" onclick="fmt('italic')"><i>I</i> &nbsp;Italic</button>
        <button class="fmt-btn" id="btn-underline" onclick="fmt('underline')"><u>U</u> &nbsp;Underline</button>
        <button class="fmt-btn" id="btn-strike" onclick="fmt('strikeThrough')"><s>S</s> &nbsp;Strikethrough</button>
      </div>
      <div class="fmt-sep"></div>
      <div class="fmt-section-label">Block</div>
      <div class="fmt-row" style="flex-direction:column;gap:2px;">
        <button class="fmt-btn" onclick="fmtBlock('h1')">H1 &nbsp;Heading 1</button>
        <button class="fmt-btn" onclick="fmtBlock('h2')">H2 &nbsp;Heading 2</button>
        <button class="fmt-btn" onclick="fmtBlock('blockquote')">" &nbsp;Blockquote</button>
        <button class="fmt-btn" onclick="fmtBlock('p')">¶ &nbsp;Paragraph</button>
      </div>
      <div class="fmt-sep"></div>
      <div class="fmt-section-label">Lists</div>
      <div class="fmt-row" style="flex-direction:column;gap:2px;">
        <button class="fmt-btn" onclick="fmt('insertUnorderedList')">• &nbsp;Bullet list</button>
        <button class="fmt-btn" onclick="fmt('insertOrderedList')">1. &nbsp;Numbered list</button>
      </div>
    </div>
  </div>

  <div class="fmt-dropdown" id="dd-align">
    <div class="fmt-trigger" id="tr-align" onclick="toggleDD('align')">⬛ Align <span class="arrow">▼</span></div>
    <div class="fmt-menu" id="menu-align">
      <div class="fmt-row" style="flex-direction:column;gap:2px;">
        <button class="fmt-btn" onclick="fmt('justifyLeft')">⬅ &nbsp;Left</button>
        <button class="fmt-btn" onclick="fmt('justifyCenter')">↔ &nbsp;Center</button>
        <button class="fmt-btn" onclick="fmt('justifyRight')">➡ &nbsp;Right</button>
        <button class="fmt-btn" onclick="fmt('justifyFull')">⬜ &nbsp;Justify</button>
      </div>
    </div>
  </div>

  <div class="fmt-dropdown" id="dd-size">
    <div class="fmt-trigger" id="tr-size" onclick="toggleDD('size')">Aa Size <span class="arrow">▼</span></div>
    <div class="fmt-menu" id="menu-size">
      <div class="size-btns">
        <button class="size-btn" style="font-size:11px;" onclick="fmt('fontSize',2)">Small</button>
        <button class="size-btn" style="font-size:14px;" onclick="fmt('fontSize',3)">Normal</button>
        <button class="size-btn" style="font-size:17px;" onclick="fmt('fontSize',4)">Large</button>
        <button class="size-btn" style="font-size:20px;" onclick="fmt('fontSize',5)">Huge</button>
      </div>
    </div>
  </div>

  <div class="fmt-dropdown" id="dd-color">
    <div class="fmt-trigger" id="tr-color" onclick="toggleDD('color')">🎨 Color <span class="arrow">▼</span></div>
    <div class="fmt-menu" id="menu-color" style="min-width:160px;">
      <div class="fmt-section-label">Text color</div>
      <div class="swatch-row">
        <span class="swatch active" style="background:#3d2a1a;" data-color="#3d2a1a" onclick="setColor(this)"></span>
        <span class="swatch" style="background:#e07930;" data-color="#e07930" onclick="setColor(this)"></span>
        <span class="swatch" style="background:#c0456a;" data-color="#c0456a" onclick="setColor(this)"></span>
        <span class="swatch" style="background:#185fa5;" data-color="#185fa5" onclick="setColor(this)"></span>
        <span class="swatch" style="background:#4a8a47;" data-color="#4a8a47" onclick="setColor(this)"></span>
        <span class="swatch" style="background:#888;" data-color="#888" onclick="setColor(this)"></span>
      </div>
      <div class="fmt-sep"></div>
      <div class="fmt-section-label">Highlight</div>
      <div class="swatch-row">
        <span class="hl-swatch hl-none active" data-hl="transparent" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#fff59d;" data-hl="#fff59d" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#a5d6a7;" data-hl="#a5d6a7" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#90caf9;" data-hl="#90caf9" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#f48fb1;" data-hl="#f48fb1" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#ffcc80;" data-hl="#ffcc80" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#ce93d8;" data-hl="#ce93d8" onclick="setHighlight(this)"></span>
        <span class="hl-swatch" style="background:#ef9a9a;" data-hl="#ef9a9a" onclick="setHighlight(this)"></span>
      </div>
    </div>
  </div>
</div>

<div class="editor-wrap">
  <div class="stats-row">
    <div class="stat-pill">📝 <strong id="char-count">0</strong> letters</div>
    <div class="stat-pill">📄 <strong id="word-count">0</strong> words</div>
    <div class="stat-pill">🔥 <strong id="streak-count">0</strong> streak</div>
  </div>
  <div id="editor" contenteditable="true" data-placeholder="Start writing here — every letter earns a point…" spellcheck="true"></div>
  <div class="milestone-bar"><div class="milestone-fill" id="milestone-fill" style="width:0%"></div></div>
  <div class="milestone-hint" id="milestone-hint">Write 50 letters to unlock your first reward!</div>
</div>

<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>✨ The Shop</h2>
      <button class="close-btn" onclick="closeShop()">✕</button>
    </div>
    <div class="modal-pts-bar">You have <strong id="modal-pts">0</strong> points to spend.</div>
    <div class="shop-section">Themes</div>
    <div class="shop-grid" id="themes-grid"></div>
    <div class="shop-section">Fonts</div>
    <div class="shop-grid" id="fonts-grid"></div>
    <div class="shop-section">Extras</div>
    <div class="shop-grid" id="extras-grid"></div>
  </div>
</div>

<script>
const MILESTONES=[50,200,500,1000,2000];
let points=0,streak=0,prevLen=0,streakTimer=null;

const themes=[
  {id:'peach',name:'Warm Peach',desc:'Cozy orangey default',price:0,preview:'🍑',css:{'--bg':'#fff8f2','--surface':'#fff3ea','--accent':'#f4a96a','--accent-dark':'#e07930','--accent-light':'#fde8d5','--text':'#3d2a1a','--text-muted':'#a07850','--border':'rgba(200,130,70,0.2)'}},
  {id:'lavender',name:'Lavender Dream',desc:'Soft purple tones',price:350,preview:'💜',css:{'--bg':'#f8f6ff','--surface':'#f0ecff','--accent':'#9b7ee6','--accent-dark':'#6d48c4','--accent-light':'#e8e0ff','--text':'#2a1a4a','--text-muted':'#7a60a8','--border':'rgba(150,100,220,0.2)'}},
  {id:'sage',name:'Sage Garden',desc:'Calm earthy green',price:400,preview:'🌿',css:{'--bg':'#f4f8f1','--surface':'#eaf2e4','--accent':'#7cb97a','--accent-dark':'#4a8a47','--accent-light':'#d5edcf','--text':'#1e3020','--text-muted':'#5a7a58','--border':'rgba(100,170,90,0.25)'}},
  {id:'night',name:'Midnight Ink',desc:'Dark mode for focus',price:600,preview:'🌙',css:{'--bg':'#1a1410','--surface':'#241c16','--accent':'#e8a855','--accent-dark':'#c07d30','--accent-light':'#3a2c1a','--text':'#f0e4d0','--text-muted':'#a08060','--border':'rgba(220,160,70,0.2)'}},
  {id:'rose',name:'Rose Petal',desc:'Blush pinks & softness',price:450,preview:'🌸',css:{'--bg':'#fff5f7','--surface':'#ffe8ed','--accent':'#f07090','--accent-dark':'#c0456a','--accent-light':'#ffd0da','--text':'#3d1a25','--text-muted':'#a06070','--border':'rgba(200,80,110,0.2)'}},
  {id:'ocean',name:'Deep Ocean',desc:'Calm navy blues',price:500,preview:'🌊',css:{'--bg':'#f0f6ff','--surface':'#e2eeff','--accent':'#4d90d9','--accent-dark':'#185fa5','--accent-light':'#c8dff7','--text':'#0d2040','--text-muted':'#4a6a90','--border':'rgba(70,130,200,0.2)'}},
];

const fonts=[
  {id:'lora',name:'Lora',desc:'Elegant serif (default)',price:0,preview:'Lora',ff:"'Lora',serif"},
  {id:'mono',name:'Space Mono',desc:'Retro typewriter feel',price:250,preview:'Mono',ff:"'Space Mono',monospace"},
  {id:'sans',name:'DM Sans',desc:'Clean & modern',price:200,preview:'Sans',ff:"'DM Sans',sans-serif"},
  {id:'playfair',name:'Playfair Display',desc:'Grand editorial headlines',price:400,preview:'Playfair',ff:"'Playfair Display',serif"},
  {id:'crimson',name:'Crimson Pro',desc:'Refined literary serif',price:350,preview:'Crimson',ff:"'Crimson Pro',serif"},
  {id:'bebas',name:'Bebas Neue',desc:'Bold all-caps display',price:500,preview:'Bebas',ff:"'Bebas Neue',sans-serif"},
  {id:'satisfy',name:'Satisfy',desc:'Flowing handwritten script',price:450,preview:'Satisfy',ff:"'Satisfy',cursive"},
  {id:'josefin',name:'Josefin Sans',desc:'Geometric & airy',price:300,preview:'Josefin',ff:"'Josefin Sans',sans-serif"},
];

const extras=[
  {id:'confetti',name:'Point Bursts',desc:'Colorful +1 animations',price:150,preview:'🎊'},
  {id:'sounds',name:'Click Sounds',desc:'Subtle typewriter audio',price:250,preview:'🔊'},
  {id:'bigcursor',name:'Glow Cursor',desc:'Warm glowing text cursor',price:200,preview:'✨'},
  {id:'wordgoal',name:'Word Goals',desc:'Daily word goal tracker',price:400,preview:'🎯'},
];

let owned={themes:['peach'],fonts:['lora'],extras:[]};
let active={theme:'peach',font:'lora'};
let activeExtras=new Set();

const editor=document.getElementById('editor');
const shopBtn=document.getElementById('shop-btn');

function updateShopBtn(){shopBtn.classList.toggle('midnight',active.theme==='night');}
function getTextLength(){return editor.innerText.replace(/\n/g,'').length;}
function updatePoints(n){points=Math.max(0,points+n);document.getElementById('topbar-pts').textContent=points;document.getElementById('modal-pts').textContent=points;updateMilestone();}
function updateMilestone(){
  const next=MILESTONES.find(m=>m>points);
  if(!next){document.getElementById('milestone-fill').style.width='100%';document.getElementById('milestone-hint').textContent='🏆 Max level reached!';return;}
  const idx=MILESTONES.indexOf(next),prev=idx>0?MILESTONES[idx-1]:0;
  const pct=Math.min(100,((points-prev)/(next-prev))*100);
  document.getElementById('milestone-fill').style.width=pct+'%';
  document.getElementById('milestone-hint').textContent=`${next-points} more pts to next milestone!`;
}
function flash(text){
  if(!activeExtras.has('confetti')&&text==='+1')return;
  const rect=editor.getBoundingClientRect();
  const el=document.createElement('div');el.className='point-flash';el.textContent=text;
  el.style.left=(rect.left+rect.width/2+(Math.random()*60-30))+'px';
  el.style.top=(rect.top+60+Math.random()*40)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),700);
}
let audioCtx=null;
function playClick(){
  if(!activeExtras.has('sounds'))return;
  try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=380+Math.random()*180;gain.gain.setValueAtTime(0.05,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.07);osc.start();osc.stop(audioCtx.currentTime+0.07);}catch(e){}
}
editor.addEventListener('input',function(){
  const cur=getTextLength(),diff=cur-prevLen;
  if(diff>0){updatePoints(diff);playClick();clearTimeout(streakTimer);streak++;document.getElementById('streak-count').textContent=streak;streakTimer=setTimeout(()=>{streak=0;document.getElementById('streak-count').textContent=0;},2500);flash('+'+diff);}
  prevLen=cur;
  document.getElementById('char-count').textContent=cur;
  const txt=editor.innerText.trim();
  document.getElementById('word-count').textContent=txt?txt.split(/\s+/).length:0;
});
function toggleDD(id){const menu=document.getElementById('menu-'+id),trigger=document.getElementById('tr-'+id);const isOpen=menu.classList.contains('open');closeAllDDs();if(!isOpen){menu.classList.add('open');trigger.classList.add('open');}}
function closeAllDDs(){document.querySelectorAll('.fmt-menu').forEach(m=>m.classList.remove('open'));document.querySelectorAll('.fmt-trigger').forEach(t=>t.classList.remove('open'));}
document.addEventListener('click',e=>{if(!e.target.closest('.fmt-dropdown'))closeAllDDs();});
function fmt(cmd,val){editor.focus();document.execCommand(cmd,false,val||null);updateState();}
function fmtBlock(tag){editor.focus();document.execCommand('formatBlock',false,tag);if(tag==='blockquote'){editor.querySelectorAll('blockquote').forEach(bq=>{bq.style.borderLeft='3px solid var(--accent)';bq.style.paddingLeft='14px';bq.style.color='var(--text-muted)';bq.style.margin='8px 0';bq.style.fontStyle='italic';});}}
function setColor(el){document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));el.classList.add('active');editor.focus();document.execCommand('foreColor',false,el.dataset.color);}
function setHighlight(el){document.querySelectorAll('.hl-swatch').forEach(s=>s.classList.remove('active'));el.classList.add('active');editor.focus();if(el.dataset.hl==='transparent')document.execCommand('removeFormat',false,null);else document.execCommand('hiliteColor',false,el.dataset.hl);}
function updateState(){
  document.getElementById('btn-bold').classList.toggle('active',document.queryCommandState('bold'));
  document.getElementById('btn-italic').classList.toggle('active',document.queryCommandState('italic'));
  document.getElementById('btn-underline').classList.toggle('active',document.queryCommandState('underline'));
  document.getElementById('btn-strike').classList.toggle('active',document.queryCommandState('strikeThrough'));
}
editor.addEventListener('keyup',updateState);editor.addEventListener('mouseup',updateState);
function openShop(){renderShop();document.getElementById('modal').classList.add('open');}
function closeShop(){document.getElementById('modal').classList.remove('open');}
function closeOnBackdrop(e){if(e.target===document.getElementById('modal'))closeShop();}
function renderShop(){document.getElementById('modal-pts').textContent=points;renderGrid('themes-grid',themes,'theme');renderGrid('fonts-grid',fonts,'font');renderGrid('extras-grid',extras,'extra');}
function renderGrid(gridId,items,type){
  const grid=document.getElementById(gridId);grid.innerHTML='';
  items.forEach(item=>{
    const isOwned=type==='theme'?owned.themes.includes(item.id):type==='font'?owned.fonts.includes(item.id):owned.extras.includes(item.id);
    const isActive=type==='theme'?active.theme===item.id:type==='font'?active.font===item.id:activeExtras.has(item.id);
    const canAfford=points>=item.price;
    const div=document.createElement('div');
    div.className='shop-item'+(isOwned?' owned':'')+((!canAfford&&!isOwned)?' cant-afford':'')+(isActive?' active-item':'');
    let preview=item.preview;
    if(type==='font')preview=`<span style="font-family:${item.ff};font-size:15px;">${item.preview}</span>`;
    div.innerHTML=`<div class="item-preview">${preview}</div><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div><div class="item-price ${isOwned?'owned-label':''}">${isOwned?(isActive?'✓ Active':'Apply →'):'🪙 '+item.price+' pts'}</div>${isOwned?'<div class="owned-check">✓</div>':''}`;
    div.addEventListener('click',()=>{
      if(!isOwned&&!canAfford)return;
      if(!isOwned){updatePoints(-item.price);if(type==='theme')owned.themes.push(item.id);else if(type==='font')owned.fonts.push(item.id);else owned.extras.push(item.id);}
      if(type==='theme')applyTheme(item.id);
      else if(type==='font')applyFont(item.id);
      else{if(activeExtras.has(item.id))activeExtras.delete(item.id);else activeExtras.add(item.id);if(item.id==='bigcursor')editor.style.caretColor=activeExtras.has('bigcursor')?'#f4a96a':'var(--accent-dark)';}
      renderShop();
    });
    grid.appendChild(div);
  });
}
function applyTheme(id){const t=themes.find(t=>t.id===id);if(!t)return;Object.entries(t.css).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));active.theme=id;updateShopBtn();}
function applyFont(id){const f=fonts.find(f=>f.id===id);if(!f)return;editor.style.fontFamily=f.ff;active.font=id;}

applyTheme('peach');applyFont('lora');updateMilestone();
</script>
